<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>证书查询</title>

<style>

    background:#f3f6fb;
    font-family:"Microsoft YaHei",Arial;

    margin:30px auto;
    background:#fff;
    border-radius:12px;
    box-shadow:0 5px 20px rgba(0,0,0,.15);
    overflow:hidden;
}

.header{
    background:#0B5ED7;
    color:#fff;
    text-align:center;
    padding:18px;
}

.header h2{
    margin:0;
    font-size:24px;
}

.photo{
    text-align:center;
    margin-top:25px;
}

.photo img{
    width:180px;
    border-radius:8px;
    border:3px solid #ddd;
}

.info{
    padding:25px;
    line-height:2;
    font-size:17px;
}

.item{
    border-bottom:1px solid #eee;
    padding:8px 0;
}

.footer{
    text-align:center;
    color:#888;
    padding:20px;
    font-size:14px;
}
</style>

</head>

<body>

</div>

</div>

</div>

<div class="item">

<div class="footer">

</div>

</html>
